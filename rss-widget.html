<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investing News</title>
  <script>
    (() => {
      const param = new URLSearchParams(window.location.search).get("clawpilotTheme");
      const theme = param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --cp-bg: #f7f4ef;
      --cp-bg-elevated: #fcfbf8;
      --cp-surface: #ffffff;
      --cp-surface-soft: #f5f5f5;
      --cp-border: #dedede;
      --cp-border-strong: #919191;
      --cp-text: #242424;
      --cp-text-muted: #5c5c5c;
      --cp-text-soft: #6f6f6f;
      --cp-accent: #b11f4b;
      --cp-accent-hover: #9a1a41;
      --cp-accent-soft: rgba(177, 31, 75, 0.08);
      --cp-accent-fg: #ffffff;
      --cp-success: #16a34a;
      --cp-danger: #dc2626;
      --cp-warning: #f59e0b;
      --cp-link: #0078d4;
      --cp-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
      --cp-shadow-hover: 0 4px 16px rgba(0,0,0,0.13);
      --cp-overlay: rgba(255, 255, 255, 0.8);
      --cp-panel: rgba(255, 255, 255, 0.86);
      --cp-panel-strong: rgba(255, 255, 255, 0.96);
      --cp-sheen: rgba(255, 255, 255, 0.55);
      --cp-highlight: rgba(177, 31, 75, 0.12);
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --cp-bg: #3d3b3a;
      --cp-bg-elevated: #343231;
      --cp-surface: #292929;
      --cp-surface-soft: #2e2e2e;
      --cp-border: #474747;
      --cp-border-strong: #5f5f5f;
      --cp-text: #dedede;
      --cp-text-muted: #919191;
      --cp-text-soft: #b0b0b0;
      --cp-accent: #fd8ea1;
      --cp-accent-hover: #fb7b91;
      --cp-accent-soft: rgba(253, 142, 161, 0.14);
      --cp-accent-fg: #1a1a1a;
      --cp-success: #4ade80;
      --cp-danger: #f87171;
      --cp-warning: #fbbf24;
      --cp-link: #4da6ff;
      --cp-shadow: 0 0 2px rgba(0,0,0,0.32), 0 1px 4px rgba(0,0,0,0.28);
      --cp-shadow-hover: 0 4px 20px rgba(0,0,0,0.4);
      --cp-overlay: rgba(41, 41, 41, 0.88);
      --cp-panel: rgba(41, 41, 41, 0.72);
      --cp-panel-strong: rgba(41, 41, 41, 0.96);
      --cp-sheen: rgba(255, 255, 255, 0.04);
      --cp-highlight: rgba(253, 142, 161, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cp-bg);
      color: var(--cp-text);
      font-size: 13px;
      line-height: 1.5;
    }

    #app { max-width: 100%; padding: 14px; }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--cp-accent);
    }

    header .logo {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--cp-accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
      color: var(--cp-accent-fg);
      font-weight: 700;
    }

    header h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--cp-text);
      letter-spacing: 0.01em;
    }

    header .subtitle {
      font-size: 11px;
      color: var(--cp-text-muted);
      margin-top: 1px;
    }

    header .refresh-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--cp-text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    header .refresh-btn:hover {
      border-color: var(--cp-accent);
      color: var(--cp-accent);
      background: var(--cp-accent-soft);
    }

    #status {
      font-size: 12px;
      color: var(--cp-text-muted);
      text-align: center;
      padding: 32px 0;
    }
    #status.error { color: var(--cp-danger); }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      list-style: none;
    }

    .card {
      background: var(--cp-surface);
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      box-shadow: var(--cp-shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
    }
    .card:hover {
      box-shadow: var(--cp-shadow-hover);
      border-color: var(--cp-accent);
      transform: translateY(-2px);
    }

    .card a {
      display: flex;
      flex-direction: column;
      flex: 1;
      text-decoration: none;
      color: inherit;
    }

    .card-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      background: var(--cp-surface-soft);
      display: block;
    }

    .card-img-placeholder {
      width: 100%;
      height: 130px;
      background: linear-gradient(135deg, var(--cp-accent-soft) 0%, var(--cp-surface-soft) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--cp-accent);
      flex-shrink: 0;
    }

    .card-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 6px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--cp-text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card:hover .card-title { color: var(--cp-accent); }

    .card-desc {
      font-size: 11.5px;
      color: var(--cp-text-soft);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      padding-top: 8px;
      border-top: 1px solid var(--cp-border);
      gap: 6px;
    }

    .card-source {
      font-size: 10.5px;
      font-weight: 700;
      color: var(--cp-accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-date {
      font-size: 10.5px;
      color: var(--cp-text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">📈</div>
      <div>
        <div class="subtitle" id="last-updated">Investing.com Thailand</div>
      </div>
      <button class="refresh-btn" onclick="loadFeed()">↻ Refresh</button>
    </header>
    <div id="status">Loading feed…</div>
    <ul class="card-grid" id="feed-list"></ul>
  </div>

  <script>
    const RSS_URL = "https://th.investing.com/rss/news_25.rss";
    // rss2json is a dedicated RSS-to-JSON service that handles CORS and encoding
    const RSS2JSON = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

    function parseDate(str) {
      if (!str) return "";
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleString("th-TH", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function stripHtml(html) {
      return html ? html.replace(/<[^>]+>/g, "").trim() : "";
    }

    async function loadFeed() {
      const status   = document.getElementById("status");
      const feedList = document.getElementById("feed-list");
      feedList.innerHTML = "";
      status.className   = "";
      status.style.display = "block";
      status.textContent = "Loading feed…";

      let items = [];
      try {
        const res  = await fetch(RSS2JSON);
        const data = await res.json();
        if (data.status === "ok" && data.items?.length) {
          items = data.items;
        } else {
          throw new Error(data.message || "Feed returned no items");
        }
      } catch (err) {
        status.className   = "error";
        status.textContent = `⚠ Could not load feed: ${err.message}`;
        return;
      }

      if (items.length === 0) {
        status.textContent = "No items found in feed.";
        return;
      }

      status.style.display = "none";
      document.getElementById("last-updated").textContent =
        `Updated ${new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" })}`;

      items.forEach(item => {
        const title  = item.title?.trim() || "(No title)";
        const link   = item.link  || "#";
        const date   = parseDate(item.pubDate);
        const source = item.author || "Investing.com";
        const desc   = stripHtml(item.description || item.content || "");
        const imgUrl = item.thumbnail && item.thumbnail !== "self"
                       ? item.thumbnail
                       : (item.enclosure?.link || null);

        const li = document.createElement("li");
        li.className = "card";

        const imgHtml = imgUrl
          ? `<img class="card-img" src="${imgUrl}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'card-img-placeholder\\'>📰</div>'">`
          : `<div class="card-img-placeholder">📰</div>`;

        li.innerHTML = `
          <a href="${link}" target="_blank" rel="noopener noreferrer">
            ${imgHtml}
            <div class="card-body">
              <div class="card-title">${title}</div>
              ${desc ? `<div class="card-desc">${desc}</div>` : '<div class="card-desc"></div>'}
              <div class="card-footer">
                <span class="card-source">${source}</span>
                ${date ? `<span class="card-date">${date}</span>` : ""}
              </div>
            </div>
          </a>`;
        feedList.appendChild(li);
      });
    }



    loadFeed();
  </script>
</body>
</html>
